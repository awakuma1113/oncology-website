<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ | 東北医科薬科大学病院 腫瘍内科</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Noto Sans JP"','sans-serif']},colors:{primary:'#065f46',secondary:'#3b82f6',dark:'#1f2937',light:'#f9fafb',}}}}</script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="public/favicon.png">
</head>
<body class="bg-[#F3F6F4] text-dark flex flex-col min-h-screen">
    <main class="flex-grow">
        <!-- Page Header -->
        <div class="bg-gray-100 py-12 border-b border-gray-200">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">お知らせ</h1>
                <p class="text-gray-600">当科の最新情報、イベント、診療に関するご案内</p>
            </div>
        </div>

        <section class="py-16 bg-white">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                
                <!-- Filters -->
                <div class="flex flex-wrap gap-2 mb-8 hidden">
                    <!-- Placeholder for category filters if needed in the future -->
                    <button class="px-4 py-1 rounded-full bg-primary text-white text-sm">すべて</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">患者さんへ</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">見学・キャリア</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">業績・活動</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-up">
                    <ul id="news-index-list" class="divide-y divide-gray-200" aria-live="polite">
                        <li class="p-6 text-sm text-gray-600">お知らせを読み込んでいます。</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/js/news.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
