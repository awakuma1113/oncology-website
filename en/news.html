<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Tohoku Medical and Pharmaceutical University Hospital</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Noto Sans JP"','sans-serif']},colors:{primary:'#065f46',secondary:'#3b82f6',dark:'#1f2937',light:'#f9fafb',}}}}</script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="../assets/images/TMPU medonc favicon.png">
</head>
<body class="bg-[#F3F6F4] text-dark flex flex-col min-h-screen">
    <main class="flex-grow">
        <!-- Page Header -->
        <div class="bg-gray-100 py-12 border-b border-gray-200">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">News</h1>
                <p class="text-gray-600">The latest information, events, and clinical guidance from our department</p>
            </div>
        </div>

        <section class="py-16 bg-white">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                
                <!-- Filters -->
                <div class="flex flex-wrap gap-2 mb-8 hidden">
                    <button class="px-4 py-1 rounded-full bg-primary text-white text-sm">All</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">For Patients</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">Resident & Recruit Info</button>
                    <button class="px-4 py-1 rounded-full bg-gray-100 text-gray-700 hover:bg-gray-200 text-sm">Achievements & Activities</button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-up">
                    <ul class="divide-y divide-gray-200">
                        <!-- News Item 1 -->
                        <li class="group">
                            <a href="#" class="block p-6 hover:bg-emerald-50 transition-colors">
                                <div class="flex flex-col sm:flex-row sm:items-center gap-4">
                                    <div class="flex items-center gap-3 w-48 flex-shrink-0">
                                        <time class="text-sm font-medium text-gray-500 font-mono">2026.04.01</time>
                                        <span class="px-2.5 py-1 text-xs font-bold rounded bg-emerald-100 text-emerald-800 border border-emerald-200">Notice</span>
                                    </div>
                                    <div class="flex-grow">
                                        <h2 class="text-lg font-bold text-gray-900 group-hover:text-primary transition-colors">The official website has been launched.</h2>
                                    </div>
                                    <div class="hidden sm:block text-gray-400 group-hover:text-primary">
                                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                    </div>
                                </div>
                            </a>
                        </li>
                    </ul>

            </div>
        </section>
    </main>

    <script src="../assets/js/main.js"></script>
</body>
</html>
